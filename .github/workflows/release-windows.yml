name: Release BFD Windows Builds

on:
  push:
    branches:
      - "main"
  workflow_dispatch:
    inputs:
      version:
        description: "Optional version override for release (example: 1.0.42)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-windows-main
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Version and Tag
        shell: pwsh
        run: |
          $requestedVersion = "${{ github.event.inputs.version }}"

          if (-not [string]::IsNullOrWhiteSpace($requestedVersion)) {
            $version = $requestedVersion.Trim().TrimStart("v")
            $releaseMode = "manual"
          }
          else {
            $patch = [int]$env:GITHUB_RUN_NUMBER
            if ($patch -gt 65000) {
              $patch = ($patch % 65000) + 1
            }
            $version = "1.0.$patch"
            $releaseMode = "auto"
          }

          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Version must use MAJOR.MINOR.PATCH format. Resolved: '$version'"
          }

          $tag = "v$version"
          "APP_VERSION=$version" >> $env:GITHUB_ENV
          "RELEASE_TAG=$tag" >> $env:GITHUB_ENV
          "RELEASE_MODE=$releaseMode" >> $env:GITHUB_ENV
          Write-Host "Resolved APP_VERSION=$version TAG=$tag MODE=$releaseMode"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate Structured Release Notes
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\release | Out-Null

          $currentTag = "$env:RELEASE_TAG"
          $tags = @(git tag --list "v*" --sort=-v:refname)
          $previousTag = $null
          foreach ($tag in $tags) {
            if ($tag -ne $currentTag) {
              $previousTag = $tag
              break
            }
          }

          if ([string]::IsNullOrWhiteSpace($previousTag)) {
            $diffLines = @(git ls-files | ForEach-Object { "A`t$_" })
            $commits = @(git log --pretty=format:"- %h %s" -n 50)
            $comparisonText = "Initial automated release snapshot"
          }
          else {
            $range = "$previousTag..HEAD"
            $diffLines = @(git diff --name-status $range)
            $commits = @(git log --pretty=format:"- %h %s" $range)
            $comparisonText = "$previousTag -> $currentTag"
          }

          $added = New-Object "System.Collections.Generic.List[string]"
          $changed = New-Object "System.Collections.Generic.List[string]"
          $removed = New-Object "System.Collections.Generic.List[string]"

          foreach ($line in $diffLines) {
            if ([string]::IsNullOrWhiteSpace($line)) { continue }

            $parts = $line -split "`t"
            if ($parts.Count -lt 2) { continue }
            $status = [string]$parts[0]

            if ($status.StartsWith("R") -and $parts.Count -ge 3) {
              $changed.Add(("{0} -> {1}" -f $parts[1], $parts[2])) | Out-Null
              continue
            }

            $path = $parts[-1]
            if ($status.StartsWith("A")) {
              $added.Add($path) | Out-Null
            }
            elseif ($status.StartsWith("D")) {
              $removed.Add($path) | Out-Null
            }
            else {
              $changed.Add($path) | Out-Null
            }
          }

          $notesPath = ".\release\BFD-$env:APP_VERSION-release-notes.md"
          $lines = New-Object "System.Collections.Generic.List[string]"
          $lines.Add("# BFD v$env:APP_VERSION Release Notes") | Out-Null
          $lines.Add("") | Out-Null
          $lines.Add("Generated automatically from repository changes.") | Out-Null
          $lines.Add("Comparison: $comparisonText") | Out-Null
          $lines.Add("") | Out-Null

          $lines.Add("## Added") | Out-Null
          if ($added.Count -eq 0) { $lines.Add("- No added files in this release.") | Out-Null } else { $added | Sort-Object -Unique | ForEach-Object { $lines.Add("- $_") | Out-Null } }
          $lines.Add("") | Out-Null

          $lines.Add("## Changed") | Out-Null
          if ($changed.Count -eq 0) { $lines.Add("- No changed files in this release.") | Out-Null } else { $changed | Sort-Object -Unique | ForEach-Object { $lines.Add("- $_") | Out-Null } }
          $lines.Add("") | Out-Null

          $lines.Add("## Removed") | Out-Null
          if ($removed.Count -eq 0) { $lines.Add("- No removed files in this release.") | Out-Null } else { $removed | Sort-Object -Unique | ForEach-Object { $lines.Add("- $_") | Out-Null } }
          $lines.Add("") | Out-Null

          $lines.Add("## Commits Included") | Out-Null
          if ($commits.Count -eq 0) { $lines.Add("- No commits detected for this comparison range.") | Out-Null } else { $commits | ForEach-Object { $lines.Add($_) | Out-Null } }

          $lines | Set-Content -LiteralPath $notesPath -Encoding UTF8
          "RELEASE_NOTES_PATH=$notesPath" >> $env:GITHUB_ENV
          Write-Host "Generated release notes: $notesPath"

      - name: Install WiX CLI v6
        shell: pwsh
        run: |
          $url = "https://github.com/wixtoolset/wix/releases/download/v6.0.2/wix-cli-x64.msi"
          $msi = Join-Path $env:RUNNER_TEMP "wix-cli-x64.msi"
          Invoke-WebRequest -Uri $url -OutFile $msi
          Start-Process msiexec.exe -ArgumentList "/i `"$msi`" /qn /norestart" -Wait -NoNewWindow

      - name: Build EXE
        shell: pwsh
        run: |
          .\BFD\gui\build_exe.ps1 -PythonExe "python"

      - name: Build MSI
        shell: pwsh
        run: |
          .\BFD\gui\build_msi.ps1 -ProductVersion "$env:APP_VERSION"

      - name: Prepare Release Assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\release | Out-Null
          $exeSource = ".\BFD\gui\dist\BFD.exe"
          $msiSource = ".\BFD\gui\dist\BFD-$env:APP_VERSION.msi"
          if (-not (Test-Path $exeSource)) { throw "EXE not found: $exeSource" }
          if (-not (Test-Path $msiSource)) { throw "MSI not found: $msiSource" }
          Copy-Item $exeSource ".\release\BFD-$env:APP_VERSION.exe" -Force
          Copy-Item $msiSource ".\release\BFD-$env:APP_VERSION.msi" -Force

      - name: Sign Assets (optional)
        shell: pwsh
        env:
          CERT_B64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
          CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CERT_B64) -or [string]::IsNullOrWhiteSpace($env:CERT_PASSWORD)) {
            Write-Host "Code-signing secrets are not configured. Skipping signing step."
            exit 0
          }
          $pfxPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:CERT_B64))
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe | Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found" }
          $assets = Get-ChildItem .\release\*.exe, .\release\*.msi
          foreach ($asset in $assets) {
            & $signtool.FullName sign /fd SHA256 /td SHA256 /tr "http://timestamp.digicert.com" /f $pfxPath /p $env:CERT_PASSWORD $asset.FullName
          }

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-${{ env.APP_VERSION }}
          path: release/*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: BFD v${{ env.APP_VERSION }}
          body_path: ${{ env.RELEASE_NOTES_PATH }}
          files: |
            release/BFD-${{ env.APP_VERSION }}.exe
            release/BFD-${{ env.APP_VERSION }}.msi
            release/BFD-${{ env.APP_VERSION }}-release-notes.md
          prerelease: false
          generate_release_notes: false
